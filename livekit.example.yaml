port: 7880
bind_addresses:
  - ""
rtc:
  tcp_port: 7881
  udp_port: 7882
  port_range_start: 50100
  port_range_end: 50200
  use_external_ip: true
  enable_loopback_candidate: false
  turn_servers:
    - host: turn.domain.tld
      port: 3478
      protocol: udp
      secret: "<static-auth-secret from coturn.conf>"
    - host: turn.domain.tld
      port: 3478
      protocol: tcp
      secret: "<static-auth-secret from coturn.conf>"
    # TLS if set up in coturn.conf
    #- host: turn.domain.tld
    #  port: 5349
    #  protocol: tls # Only if you have already set up TLS in your coturn
    #  secret: "<static-auth-secret from coturn.conf>"
keys:
  # https://continuwuity.org/calls/livekit#2-services
  key-secret-pair: <docker run --rm livekit/livekit-server:latest generate-keys>
